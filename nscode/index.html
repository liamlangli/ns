<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>NSCode — NanoScript Editor</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 100%; height: 100%;
    background: #1e1e24;
    overflow: hidden;
    font-family: 'Courier New', monospace;
  }

  #editor-canvas {
    display: block;
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: calc(100% - 28px);
    cursor: text;
    touch-action: none;
  }

  #status-bar {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    height: 28px;
    background: #2a2a35;
    border-top: 1px solid #3a3a48;
    display: flex;
    align-items: center;
    padding: 0 12px;
    gap: 16px;
    user-select: none;
  }

  #status-bar .brand {
    color: #7ab4f5;
    font-size: 12px;
    font-weight: bold;
    letter-spacing: 0.05em;
  }

  #status {
    color: #888;
    font-size: 12px;
    flex: 1;
  }

  #no-webgpu {
    display: none;
    position: fixed;
    inset: 0;
    background: #1e1e24;
    color: #e08080;
    font-size: 16px;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 12px;
    text-align: center;
    padding: 32px;
  }
  #no-webgpu h2 { color: #f0a0a0; font-size: 24px; }
  #no-webgpu code { background: #2a2a35; padding: 2px 6px; border-radius: 4px; color: #ccc; }

  /* Hidden textarea for IME / keyboard input */
  #hidden-input {
    position: fixed;
    top: -200px; left: -200px;
    width: 1px; height: 1px;
    opacity: 0;
    border: none; outline: none;
    background: transparent;
    color: transparent;
    caret-color: transparent;
    resize: none;
    overflow: hidden;
  }
</style>
</head>
<body>

<canvas id="editor-canvas"></canvas>

<div id="status-bar">
  <span class="brand">NSCode</span>
  <span id="status">Initializing WebGPU…</span>
</div>

<div id="no-webgpu">
  <h2>WebGPU Not Available</h2>
  <p>This editor requires WebGPU support.</p>
  <p>Try <strong>Chrome 113+</strong> or <strong>Edge 113+</strong> with WebGPU enabled.</p>
  <p>In Chrome you can enable it at: <code>chrome://flags/#enable-unsafe-webgpu</code></p>
</div>

<textarea id="hidden-input" autocomplete="off" autocorrect="off"
          autocapitalize="off" spellcheck="false" tabindex="-1"></textarea>

<script type="module" src="src/main.js"></script>

<script>
  // Show fallback if WebGPU is unavailable
  if (!navigator.gpu) {
    document.getElementById('editor-canvas').style.display = 'none';
    document.getElementById('status-bar').style.display = 'none';
    document.getElementById('no-webgpu').style.display = 'flex';
  }
</script>
</body>
</html>
