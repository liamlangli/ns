<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>NSCode — NanoScript Playground</title>
<style>
  html,body{margin:0;padding:0;width:100%;height:100%;overflow:hidden;background:#1e1e24}
  #c{display:block;position:fixed;top:0;left:0;touch-action:none;cursor:default}
  #hi{position:fixed;top:-200px;left:-200px;width:1px;height:1px;opacity:0;border:none;outline:none;
      background:transparent;color:transparent;caret-color:transparent;resize:none;overflow:hidden}
</style>
</head>
<body>
<canvas id="c"></canvas>
<textarea id="hi" autocomplete="off" autocorrect="off" autocapitalize="off"
          spellcheck="false" tabindex="-1"></textarea>
<script type="module" src="src/main.js"></script>
</body>
</html>
