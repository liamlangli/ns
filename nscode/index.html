<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>NSCode — NanoScript Playground</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #1e1e24;
    --surface: #2a2a35;
    --border: #3a3a48;
    --text: #e0e0ec;
    --text-dim: #888;
    --accent: #5c8fef;
    --accent-dim: #3a6ad4;
    --green: #4caf72;
    --red: #e05c5c;
    --yellow: #d4a44c;
    --font: 'Courier New', Courier, monospace;
  }

  html, body {
    width: 100%; height: 100%;
    background: var(--bg);
    color: var(--text);
    overflow: hidden;
    font-family: var(--font);
  }

  /* ── Layout ──────────────────────────────────────────── */
  #app {
    display: flex;
    flex-direction: column;
    width: 100%; height: 100%;
  }

  /* ── Toolbar ─────────────────────────────────────────── */
  #toolbar {
    flex-shrink: 0;
    height: 44px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 12px;
    gap: 10px;
    user-select: none;
  }

  #toolbar .brand {
    color: var(--accent);
    font-size: 15px;
    font-weight: bold;
    letter-spacing: 0.06em;
    margin-right: 4px;
  }

  #toolbar .sep { width: 1px; height: 22px; background: var(--border); margin: 0 2px; }

  .tb-btn {
    height: 30px;
    padding: 0 14px;
    border: 1px solid var(--border);
    border-radius: 5px;
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    font-size: 13px;
    cursor: pointer;
    display: flex; align-items: center; gap: 5px;
    transition: background 0.15s, border-color 0.15s;
  }
  .tb-btn:hover { background: var(--surface); border-color: var(--accent); color: var(--accent); }
  .tb-btn.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
  .tb-btn.primary:hover { background: var(--accent-dim); }

  #example-select {
    height: 30px;
    padding: 0 8px;
    border: 1px solid var(--border);
    border-radius: 5px;
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    font-size: 13px;
    cursor: pointer;
    outline: none;
  }
  #example-select:hover { border-color: var(--accent); }

  .tb-hint {
    margin-left: auto;
    color: var(--text-dim);
    font-size: 12px;
  }

  /* ── Main split area ─────────────────────────────────── */
  #main {
    flex: 1;
    display: flex;
    overflow: hidden;
  }

  /* ── Editor pane ─────────────────────────────────────── */
  #editor-pane {
    flex: 1;
    min-width: 200px;
    position: relative;
    overflow: hidden;
  }

  #editor-canvas {
    display: block;
    width: 100%; height: 100%;
    cursor: text;
    touch-action: none;
  }

  /* ── Divider ─────────────────────────────────────────── */
  #divider {
    width: 5px;
    background: var(--border);
    cursor: col-resize;
    flex-shrink: 0;
    transition: background 0.15s;
  }
  #divider:hover, #divider.dragging { background: var(--accent); }

  /* ── Output pane ─────────────────────────────────────── */
  #output-pane {
    width: 40%;
    min-width: 180px;
    max-width: 65%;
    display: flex;
    flex-direction: column;
    border-left: none;
    overflow: hidden;
  }

  #output-header {
    flex-shrink: 0;
    height: 36px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 12px;
    gap: 8px;
    font-size: 12px;
    color: var(--text-dim);
    user-select: none;
  }

  #output-header .label { font-weight: bold; color: var(--text); }

  #status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--text-dim);
    flex-shrink: 0;
  }
  #status-dot.ok  { background: var(--green); }
  #status-dot.err { background: var(--red); }
  #status-dot.run { background: var(--yellow); animation: pulse 0.6s infinite alternate; }

  @keyframes pulse { from { opacity: 0.4; } to { opacity: 1; } }

  #output-scroll {
    flex: 1;
    overflow-y: auto;
    overflow-x: auto;
    padding: 10px 12px;
    font-size: 13px;
    line-height: 1.6;
    background: var(--bg);
    white-space: pre-wrap;
    word-break: break-all;
  }

  #output-scroll::-webkit-scrollbar { width: 6px; height: 6px; }
  #output-scroll::-webkit-scrollbar-track { background: transparent; }
  #output-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  .out-line { margin: 0; }
  .out-line.print { color: var(--text); }
  .out-line.error { color: var(--red); }
  .out-line.info  { color: var(--text-dim); }
  .out-line.sep   { color: var(--border); }
  .out-line.time  { color: var(--yellow); }

  /* ── Status bar ──────────────────────────────────────── */
  #status-bar {
    flex-shrink: 0;
    height: 26px;
    background: var(--surface);
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 12px;
    gap: 14px;
    font-size: 11px;
    color: var(--text-dim);
    user-select: none;
  }

  #status-bar .brand { color: var(--accent); font-weight: bold; letter-spacing: 0.05em; }
  #editor-status { flex: 1; }

  #wgpu-badge {
    padding: 1px 6px;
    border-radius: 3px;
    font-size: 10px;
    background: var(--border);
    color: var(--text-dim);
  }
  #wgpu-badge.ok  { background: #1e3a28; color: var(--green); }
  #wgpu-badge.err { background: #3a1e1e; color: var(--red); }

  /* ── WebGPU fallback ─────────────────────────────────── */
  #no-webgpu {
    display: none;
    position: absolute;
    inset: 0;
    background: var(--bg);
    color: #e08080;
    font-size: 15px;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 12px;
    text-align: center;
    padding: 32px;
    z-index: 10;
  }
  #no-webgpu h2 { color: #f0a0a0; font-size: 22px; margin-bottom: 6px; }
  #no-webgpu code { background: var(--surface); padding: 2px 6px; border-radius: 4px; color: #ccc; }
  #no-webgpu p { max-width: 480px; line-height: 1.6; }

  /* ── Hidden textarea for IME/keyboard ───────────────── */
  #hidden-input {
    position: fixed;
    top: -200px; left: -200px;
    width: 1px; height: 1px;
    opacity: 0;
    border: none; outline: none;
    background: transparent;
    color: transparent;
    caret-color: transparent;
    resize: none;
    overflow: hidden;
  }
</style>
</head>
<body>
<div id="app">

  <!-- Toolbar -->
  <div id="toolbar">
    <span class="brand">NSCode</span>
    <div class="sep"></div>
    <button id="run-btn" class="tb-btn primary">&#9654; Run</button>
    <button id="clear-btn" class="tb-btn">Clear</button>
    <div class="sep"></div>
    <select id="example-select">
      <option value="">— Examples —</option>
      <option value="hello">Hello World</option>
      <option value="fib">Fibonacci</option>
      <option value="factorial">Factorial</option>
      <option value="loop">Loop &amp; Sum</option>
      <option value="fizzbuzz">FizzBuzz</option>
      <option value="primes">Primes</option>
      <option value="closure">Closures</option>
    </select>
    <span class="tb-hint">Ctrl+Enter to run</span>
  </div>

  <!-- Main split area -->
  <div id="main">

    <!-- Editor pane -->
    <div id="editor-pane">
      <canvas id="editor-canvas"></canvas>
      <div id="no-webgpu">
        <h2>WebGPU Not Available</h2>
        <p>This editor requires WebGPU. Try <strong>Chrome 113+</strong> or <strong>Edge 113+</strong>.</p>
        <p>Enable it at: <code>chrome://flags/#enable-unsafe-webgpu</code></p>
      </div>
    </div>

    <!-- Drag divider -->
    <div id="divider"></div>

    <!-- Output pane -->
    <div id="output-pane">
      <div id="output-header">
        <div id="status-dot"></div>
        <span class="label">Output</span>
        <span id="run-status">Ready</span>
      </div>
      <div id="output-scroll"></div>
    </div>

  </div>

  <!-- Status bar -->
  <div id="status-bar">
    <span class="brand">NSCode</span>
    <span id="editor-status">Initializing…</span>
    <span id="wgpu-badge">WebGPU</span>
  </div>

</div>

<textarea id="hidden-input" autocomplete="off" autocorrect="off"
          autocapitalize="off" spellcheck="false" tabindex="-1"></textarea>

<script type="module" src="src/main.js"></script>
</body>
</html>
