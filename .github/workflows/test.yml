name: Test

on:
  push:
    branches: [main, master, 'claude/**']
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libreadline-dev libffi-dev

      # `make test` builds libns.a and the C test binaries, then runs them.
      # -Werror is disabled for the same GCC 13 warnings noted in build.yml.
      - name: Test
        run: make test NS_WERROR=0

      # The NSCode editor tests are written in ns itself: editor_test.ns is a
      # pure document-model test, frame_test.ns drives the render/input path
      # headlessly through the no-op Linux view backend, and ui_layout_test.ns
      # covers imported UI alignment constants.
      - name: Build interpreter and native modules
        run: make NS_WERROR=0

      - name: NSCode editor tests
        run: |
          bin/ns run nscode/native/editor_test.ns
          bin/ns run nscode/native/frame_test.ns
          bin/ns run nscode/native/ui_layout_test.ns
