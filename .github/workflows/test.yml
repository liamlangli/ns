name: Test

on:
  push:
    branches: [main, master, 'claude/**']
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libreadline-dev libffi-dev

      # `make test` builds the interpreter, required native modules and C test
      # binaries, then runs the core suites.
      # -Werror is disabled for the same GCC 13 warnings noted in build.yml.
      - name: Test
        run: make test NS_WERROR=0
