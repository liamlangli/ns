name: Deploy NSCode to GitHub Pages

on:
  push:
    branches: [main, master, 'claude/**']
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  # Build on every triggered branch so the bundle is validated in CI. Only the
  # deploy job is gated to the default branch (the github-pages environment
  # rejects deployments from other branches).
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build NSCode app
        run: |
          make
          bin/ns test nscode/native/test/editor_test.ns
          bin/ns test nscode/native/test/ui_ffi_test.ns
          bin/ns test nscode/native/test/ui_layout_test.ns
          bin/ns test nscode/native/test/workspace_test.ns
          cp nscode/native/ns.web.mod nscode/native/ns.mod
          bin/ns build nscode/native
          node --check nscode/native/bin/ns-wasm.js
          node -e "const fs=require('fs'); if (!WebAssembly.validate(fs.readFileSync('nscode/native/bin/nscode.wasm'))) process.exit(1)"

      - name: Assemble site
        run: |
          rm -rf _site
          mkdir -p _site/nscode
          # Landing page + its assets (favicon/logo) served from the root.
          cp index.html _site/index.html
          mkdir -p _site/sample
          cp sample/ns.png sample/ns.svg _site/sample/
          # Bypass Jekyll so the generated Wasm bundle is served verbatim.
          touch _site/.nojekyll
          # Browser build of the shared native NSCode app, served under /nscode/.
          cp -r nscode/native/bin/. _site/nscode/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'

  deploy:
    needs: build
    if: github.ref == 'refs/heads/main'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
